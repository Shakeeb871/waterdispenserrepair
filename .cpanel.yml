---
deployment:
  tasks:
    # $HOME automatically points to your cPanel home folder — no editing needed.
    - export DEPLOYPATH=$HOME/public_html/
    - /bin/mkdir -p $DEPLOYPATH/assets
    - /bin/mkdir -p $DEPLOYPATH/includes
    - /bin/mkdir -p $DEPLOYPATH/blog
    - /bin/mkdir -p $DEPLOYPATH/brands
    - /bin/mkdir -p $DEPLOYPATH/locations
    # Remove old flat brand/location files left by earlier deploys (now in folders)
    - /bin/rm -f $DEPLOYPATH/brand-*.html
    - /bin/rm -f $DEPLOYPATH/water-dispenser-repair-*.html
    # Core root HTML pages (home, about, services, 404)
    - /bin/cp *.html           $DEPLOYPATH
    # PHP, config and SEO files
    - /bin/cp contact.php      $DEPLOYPATH
    - /bin/cp robots.txt       $DEPLOYPATH
    - /bin/cp sitemap.xml      $DEPLOYPATH
    - /bin/cp site.webmanifest $DEPLOYPATH
    - /bin/cp llms.txt         $DEPLOYPATH
    - /bin/cp .htaccess        $DEPLOYPATH
    # Directories
    - /bin/cp -R assets/.      $DEPLOYPATH/assets/
    - /bin/cp -R includes/.    $DEPLOYPATH/includes/
    - /bin/cp -R blog/.        $DEPLOYPATH/blog/
    - /bin/cp -R brands/.      $DEPLOYPATH/brands/
    - /bin/cp -R locations/.   $DEPLOYPATH/locations/
